<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect With Me - MyResume</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #050A18;
            --bg-secondary: #0F172A;
            --accent-gold: #C6A15B;
            --accent-gold-light: #D4AF77;
            --accent-blue: #4F8CFF;
            --text-main: #F8FAFC;
            --text-secondary: #94A3B8;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(198, 161, 91, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(79, 140, 255, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Main Card */
        .link-card {
            position: relative;
            z-index: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(20px);
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glow Effect */
        .link-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-blue));
            border-radius: 31px;
            z-index: -1;
            opacity: 0.3;
            filter: blur(20px);
        }

        /* Profile Section */
        .profile-section {
            margin-bottom: 2rem;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: var(--bg-primary);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .profile-tagline {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Links Section */
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-button {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-main);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .link-button:hover::before {
            left: 100%;
        }

        .link-button:hover {
            transform: translateY(-3px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 30px rgba(198, 161, 91, 0.2);
        }

        .link-icon {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border-radius: 12px;
            font-size: 1.25rem;
            transition: all 0.3s ease;
        }

        .link-button:hover .link-icon {
            background: var(--accent-gold);
            color: var(--bg-primary);
        }

        .link-icon.github { color: #fff; }
        .link-icon.linkedin { color: #0A66C2; }
        .link-icon.leetcode { color: #FFA116; }

        .link-info {
            flex: 1;
            text-align: left;
        }

        .link-name {
            font-weight: 600;
            font-size: 1rem;
            display: block;
        }

        .link-url {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: block;
            margin-top: 0.25rem;
            word-break: break-all;
        }

        .link-arrow {
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .link-button:hover .link-arrow {
            color: var(--accent-gold);
            transform: translateX(5px);
        }

        /* Footer */
        .link-footer {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .link-footer p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .link-footer a {
            color: var(--accent-gold);
            text-decoration: none;
        }

        /* Loading State */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .link-card {
                padding: 2rem 1.5rem;
            }

            .profile-name {
                font-size: 1.5rem;
            }

            .link-button {
                padding: 1rem 1.25rem;
            }

            .link-icon {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="link-card">
        <div class="profile-section">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h1 class="profile-name" id="profile-name">Loading...</h1>
            <p class="profile-tagline">Connect with me on social media</p>
        </div>
        
        <div class="links-section" id="links-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading links...</p>
            </div>
        </div>
        
        <div class="link-footer">
            <p>Powered by <a href="/">MyResume</a></p>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        async function loadProfile() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/profile`);
                const profile = await response.json();
                
                if (profile.name) {
                    document.getElementById('profile-name').textContent = profile.name;
                }
                
                const linksContainer = document.getElementById('links-container');
                const links = [];
                
                if (profile.github) {
                    links.push({
                        name: 'GitHub',
                        url: profile.github,
                        icon: 'fab fa-github',
                        iconClass: 'github'
                    });
                }
                
                if (profile.linkedin) {
                    links.push({
                        name: 'LinkedIn',
                        url: profile.linkedin,
                        icon: 'fab fa-linkedin-in',
                        iconClass: 'linkedin'
                    });
                }
                
                if (profile.leetcode) {
                    links.push({
                        name: 'LeetCode',
                        url: profile.leetcode,
                        icon: 'fas fa-code',
                        iconClass: 'leetcode'
                    });
                }
                
                if (links.length > 0) {
                    linksContainer.innerHTML = links.map(link => `
                        <a href="${link.url}" class="link-button" target="_blank">
                            <div class="link-icon ${link.iconClass}">
                                <i class="${link.icon}"></i>
                            </div>
                            <div class="link-info">
                                <span class="link-name">${link.name}</span>
                                <span class="link-url">${link.url.replace(/^https?:\/\//, '')}</span>
                            </div>
                            <i class="fas fa-chevron-right link-arrow"></i>
                        </a>
                    `).join('');
                } else {
                    linksContainer.innerHTML = `
                        <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                            <i class="fas fa-link" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
                            <p>No social links configured yet.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('links-container').innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                        <i class="fas fa-exclamation-circle" style="font-size: 2rem; margin-bottom: 1rem; display: block; color: var(--error);"></i>
                        <p>Error loading profile data.</p>
                    </div>
                `;
            }
        }

        // Load profile on page load
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
