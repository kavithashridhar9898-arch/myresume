services:
  - type: web
    name: myresume-portfolio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: myresume-db
          property: connectionString

databases:
  - name: myresume-db
    plan: free
    databaseName: myresume
    user: myresume
